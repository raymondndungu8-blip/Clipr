# Fly.io config for the Clipr render service.
# `fly launch`/`fly deploy` sets the app name; region/memory chosen for Remotion.
app = "clipr-render"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "2048mb"
  cpus = 1
